<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>원고 작업대</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="workbench-shell">
    <header class="top-command-zone">
      <section class="project-strip">
        <div class="project-identity">
          <span class="app-mark">W</span>
          <div class="project-copy">
            <h1 id="project-title">원고 작업대</h1>
            <p id="project-path"></p>
          </div>
        </div>
        <div class="project-state">
          <span id="autosave-pill" class="state-pill">자동저장</span>
          <span id="theme-pill" class="state-pill">기본</span>
          <span id="scene-count-pill" class="state-pill">0 장면</span>
        </div>
      </section>
      <nav id="top-menu" class="top-menu" aria-label="작업대 메뉴"></nav>
    </header>

    <section class="workbench-grid">
      <aside id="left-rail" class="left-rail">
        <div class="rail-tabs">
          <button class="rail-tab active" type="button">바인더</button>
          <button class="rail-tab" type="button">설정집</button>
          <button class="rail-tab" type="button">자료</button>
        </div>
        <div class="rail-header">
          <strong>장면</strong>
          <span id="binder-count">0</span>
        </div>
        <div id="scene-list" class="scene-list"></div>
      </aside>

      <section id="center-surface" class="center-surface">
        <div class="surface-toolbar">
          <div>
            <span class="surface-kicker">현재 작업</span>
            <h2 id="active-title">장면 없음</h2>
          </div>
          <span id="active-status" class="status-badge">초고</span>
        </div>

        <section class="editor-stage">
          <div class="writing-sheet">
            <p id="active-summary" class="scene-summary"></p>
            <div id="active-tags" class="tag-row"></div>
            <div class="scene-stat-grid">
              <div>
                <span>공백 제외</span>
                <strong id="active-length">0</strong>
              </div>
              <div>
                <span>공백 포함</span>
                <strong id="active-length-spaces">0</strong>
              </div>
              <div>
                <span>장면 유형</span>
                <strong id="active-type">Scene</strong>
              </div>
            </div>
          </div>
        </section>
      </section>

      <aside id="right-inspector" class="right-inspector">
        <section class="inspector-section">
          <div class="section-title">
            <strong>인스펙터</strong>
            <span id="active-updated">-</span>
          </div>
          <dl class="meta-list">
            <div>
              <dt>상태</dt>
              <dd id="inspector-status">초고</dd>
            </div>
            <div>
              <dt>유형</dt>
              <dd id="inspector-type">Scene</dd>
            </div>
            <div>
              <dt>태그</dt>
              <dd id="inspector-tags">-</dd>
            </div>
          </dl>
        </section>

        <section class="inspector-section">
          <div class="section-title">
            <strong>파이프라인</strong>
            <span>로컬</span>
          </div>
          <div class="pipeline-list">
            <div><span>초고</span><strong id="pipeline-draft">0</strong></div>
            <div><span>수정중</span><strong id="pipeline-revising">0</strong></div>
            <div><span>완료</span><strong id="pipeline-final">0</strong></div>
            <div><span>제외</span><strong id="pipeline-excluded">0</strong></div>
          </div>
        </section>
      </aside>
    </section>

    <aside id="floating-remote" class="floating-remote" aria-label="리모컨">
      <div class="remote-header">
        <strong>리모컨</strong>
        <button id="remote-density-toggle" type="button">아이콘</button>
      </div>
      <div id="remote-command-list" class="remote-command-list"></div>
    </aside>

    <footer id="bottom-status" class="bottom-status">
      <span id="status-text">초기화 중...</span>
      <span id="status-active-scene">-</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
